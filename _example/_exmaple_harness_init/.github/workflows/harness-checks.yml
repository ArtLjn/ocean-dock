name: Harness Checks

on: [pull_request]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: TypeScript Check
        run: |
          if [ -d "frontend" ]; then
            cd frontend && pnpm install && npx tsc --noEmit
          else
            echo "⏭️  无前端目录，跳过"
          fi

      - name: Python Lint
        run: |
          if [ -d "backend" ]; then
            pip install ruff && ruff check backend/
          else
            echo "⏭️  无后端目录，跳过"
          fi

      - name: Python Tests
        run: |
          if [ -d "backend" ]; then
            cd backend && pip install pytest && pytest -v
          else
            echo "⏭️  无后端目录，跳过"
          fi

      - name: Frontend Tests
        run: |
          if [ -d "frontend" ]; then
            cd frontend && pnpm install && pnpm test
          else
            echo "⏭️  无前端目录，跳过"
          fi

      - name: Architecture Check
        run: bash scripts/check-layer-deps.sh

      - name: File Size Check
        run: |
          ERRORS=0
          if [ -d "backend" ]; then
            find backend/ -name '*.py' -not -path '*/__pycache__/*' -not -path '*/.venv/*' | while read f; do
              lines=$(wc -l < "$f")
              if [ "$lines" -gt 500 ]; then
                echo "❌ $f 有 $lines 行（上限 500）"
                echo "✅ FIX: 拆分为更小的模块"
                exit 1
              fi
            done
          fi
          if [ -d "frontend/src" ]; then
            find frontend/src/ -name '*.ts' -o -name '*.tsx' | while read f; do
              lines=$(wc -l < "$f")
              if [ "$lines" -gt 300 ]; then
                echo "❌ $f 有 $lines 行（上限 300）"
                echo "✅ FIX: 拆分为更小的组件或模块"
                exit 1
              fi
            done
          fi

      - name: Doc Freshness
        run: bash scripts/check-doc-freshness.sh

